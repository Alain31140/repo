<script>
async function getData(lat, lon) {

  // ────────────────
  // 1. Reverse geocoding (ville / département / région)
  // ────────────────
  const geoUrl =
    "https://nominatim.openstreetmap.org/reverse?format=json&lat=" +
    lat + "&lon=" + lon;

  const geoRes = await fetch(geoUrl);
  const geoData = await geoRes.json();

  const ville =
    geoData.address.city ||
    geoData.address.town ||
    geoData.address.village ||
    "Ville inconnue";

  const departement = geoData.address.county || "Département inconnu";
  const region = geoData.address.state || "Région inconnue";

  document.getElementById("position").innerHTML =
    "📍 <b>" + ville + "</b><br>" +
    "📍 " + departement + "<br>" +
    "📍 " + region;

  // ────────────────
  // 2. Météo (Open-Meteo gratuit sans clé API)
  // ────────────────
  const weatherUrl =
    "https://api.open-meteo.com/v1/forecast?latitude=" +
    lat + "&longitude=" + lon +
    "&current_weather=true";

  const weatherRes = await fetch(weatherUrl);
  const weatherData = await weatherRes.json();

  const temp = weatherData.current_weather.temperature;
  const wind = weatherData.current_weather.windspeed;

  document.getElementById("meteo").innerHTML =
    "🌡️ Température : <b>" + temp + "°C</b><br>" +
    "💨 Vent : " + wind + " km/h";
}

// ────────────────
// 3. Géolocalisation
// ────────────────
if (navigator.geolocation) {

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      getData(pos.coords.latitude, pos.coords.longitude);
    },
    function() {
      document.getElementById("position").textContent =
        "❌ Géolocalisation refusée";
    }
  );

} else {
  document.getElementById("position").textContent =
    "❌ Géolocalisation non supportée";
}
</script></body>
